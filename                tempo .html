<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima - Agro na Palma da Mão</title>
    <style>
        :root {
            --bg-color: #0a1a0a;
            --card-bg: #1a2e1a;
            --primary: #2e7d32;
            --accent: #81c784;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .header {
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .btn-localizar {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .btn-localizar:active {
            transform: scale(0.98);
            background-color: #1b5e20;
        }

        #resultado {
            margin-top: 25px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .temp-principal {
            font-size: 4rem;
            font-weight: bold;
            color: var(--accent);
            margin: 10px 0;
        }

        .detalhes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            text-align: left;
        }

        .dado {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .label { font-size: 0.8rem; opacity: 0.7; display: block; }
        .valor { font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin: 0; font-size: 1.5rem;">Agro na Palma da Mão</h1>
        <small style="color: var(--primary)">Monitoramento Meteorológico Local</small>
    </div>

    <button class="btn-localizar" onclick="buscarClima()">
        <span>📍</span> BUSCAR CLIMA LOCAL
    </button>

    <div id="resultado">
        <h2 id="cidade" style="margin: 0;">--</h2>
        <div id="data-hora" style="font-size: 0.9rem; opacity: 0.6; margin-bottom: 10px;"></div>
        
        <div class="temp-principal" id="temp">--°C</div>
        <div id="condicao" style="text-transform: capitalize; font-size: 1.2rem; font-weight: 500;">--</div>

        <div class="detalhes-grid">
            <div class="dado">
                <span class="label">💧 UMIDADE</span>
                <span class="valor" id="umidade">--</span>%
            </div>
            <div class="dado">
                <span class="label">💨 VENTO</span>
                <span class="valor" id="vento">--</span> km/h
            </div>
            <div class="dado">
                <span class="label">🌡️ SENSAÇÃO</span>
                <span class="valor" id="sensacao">--</span>°C
            </div>
            <div class="dado">
                <span class="label">☁️ NUVENS</span>
                <span class="valor" id="nuvens">--</span>%
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'e1f33f6fd46fd77a1244d17dde90ab4a';

    function buscarClima() {
        if ("geolocation" in navigator) {
            const btn = document.querySelector('.btn-localizar');
            btn.innerText = "Consultando satélite...";
            
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=pt_br&appid=${API_KEY}`;

                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        exibirDados(data);
                        btn.innerHTML = "<span>📍</span> BUSCAR CLIMA LOCAL";
                    })
                    .catch(() => {
                        alert("Erro ao conectar com o servidor de clima.");
                        btn.innerHTML = "<span>📍</span> BUSCAR CLIMA LOCAL";
                    });
            }, (erro) => {
                alert("Erro: Necessário ativar o GPS do celular.");
                btn.innerHTML = "<span>📍</span> BUSCAR CLIMA LOCAL";
            });
        }
    }

    function exibirDados(data) {
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('cidade').innerText = data.name;
        document.getElementById('temp').innerText = Math.round(data.main.temp) + '°C';
        document.getElementById('condicao').innerText = data.weather[0].description;
        document.getElementById('umidade').innerText = data.main.humidity;
        document.getElementById('vento').innerText = Math.round(data.wind.speed * 3.6);
        document.getElementById('sensacao').innerText = Math.round(data.main.feels_like);
        document.getElementById('nuvens').innerText = data.clouds.all;
        
        const agora = new Date();
        document.getElementById('data-hora').innerText = agora.toLocaleDateString() + ' às ' + agora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
</script>

</body>
</html>
